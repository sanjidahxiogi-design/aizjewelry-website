<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Aiz Jewelry</title>
    <link rel="stylesheet" href="style.css?v=1.5">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FP875E408D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      async function initGa4Config() {
        const configParams = {};
        try {
          const response = await fetch('/cdn-cgi/trace', { cache: 'no-store' });
          const trace = await response.text();
          const ipMatch = trace.match(/^ip=(.+)$/m);
          const visitorIp = ipMatch ? ipMatch[1].trim() : '';
          if (visitorIp === '14.127.70.180') {
            configParams.traffic_type = 'internal';
          }
        } catch (error) {}
        gtag('config', 'G-FP875E408D', configParams);
      }
      initGa4Config().then(function() {
        gtag('event', 'thank_you_view', {
          event_category: 'lead',
          event_label: 'FormSubmit thank-you page'
        });
      });
    </script>
    <style>
        .thank-you-section {
            padding: 150px 0;
            text-align: center;
            background-color: #f9f9f9;
        }
        .thank-you-content h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3rem;
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        .thank-you-content p {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">
                <img src="logo.png" alt="Aiz Jewelry">
                <span>AIZ JEWELRY</span>
            </div>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="/">HOME</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <section class="thank-you-section">
        <div class="container thank-you-content">
            <h1>Thank You!</h1>
            <p>Your inquiry has been received. Our team will review your project and get back to you within 12 hours.</p>
            <a href="/" class="btn primary">Return to Home</a>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 Shenzhen Aiz Jewelry Co., Ltd. All Rights Reserved.</p>
            <p>Sustainable Custom Jewelry for Your Unique Brand</p>
        </div>
    </footer>
</body>
</html>
