<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote - Aiz Jewelry</title>
    <link rel="stylesheet" href="style.css?v=30.0">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        main { padding-top: 150px !important; min-height: 85vh; background: #fff; display: flex; align-items: center; }
        .thank-you-inline { display: none !important; text-align: center; padding: 60px 20px; background: #fff; }
        .thank-you-inline.visible { display: block !important; }
        .back-home-premium-btn { display: inline-block; padding: 15px 45px; border: 1px solid #111; color: #111; text-decoration: none; font-weight: 700; letter-spacing: 1px; transition: all 0.3s; margin-top: 30px; text-transform: uppercase; }
        .back-home-premium-btn:hover { background: #111; color: #fff; }
    </style>
</head>
<body>
    <header class="header">
        <nav class="container nav-container" style="display: flex; justify-content: space-between; align-items: center; padding: 25px 0;">
            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 15px; text-decoration: none; color: #111;">
                <img src="https://sc02.alicdn.com/kf/Se1318a00bc9742468f7f2b69415cb0b7e.png" alt="Logo" style="height: 50px;">
                <div class="logo-text" style="display: flex; flex-direction: column;">
                    <span style="font-size: 1.6rem; font-weight: 800; letter-spacing: 2px;">AIZ</span>
                    <span style="font-size: 0.75rem; letter-spacing: 4px; color: #c5a059;">JEWELRY</span>
                </div>
            </a>
            <div class="nav-links" style="display: flex; align-items: center; gap: 40px;">
                <a href="index.html" style="text-decoration: none; color: #111; font-weight: 600; font-size: 0.85rem;">HOME</a>
                <a href="contact.html" class="nav-cta" style="background: #111; color: #fff; padding: 14px 30px; text-decoration: none; font-size: 0.8rem; font-weight: 700; letter-spacing: 2px;">GET A QUOTE</a>
            </div>
        </nav>
    </header>
    <main>
        <section id="contact" style="width:100%;">
            <div class="container">
                <div class="contact-card" style="display: grid; grid-template-columns: 1fr 1.2fr; box-shadow: 0 30px 70px rgba(0,0,0,0.12); border-radius: 4px; overflow: hidden; background: #fff;">
                    <div class="contact-info" style="background: #111; color: #fff; padding: 70px; display: flex; flex-direction: column; justify-content: center;">
                        <h2 style="font-family: 'Bodoni Moda', serif; font-size: 3.2rem; margin-bottom: 25px; line-height: 1.1;">Collaborate with Your Brand Partner</h2>
                        <p style="color: #888; font-size: 1.1rem; line-height: 1.7; margin-bottom: 45px;">Discuss your unique brand vision with our specialized team.</p>
                        <div class="contact-details" style="display: flex; flex-direction: column; gap: 30px;">
                            <div class="contact-item"><span style="color: #c5a059; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;">EMAIL</span><br><strong style="font-size: 1.2rem;">sales@aizjewelry.com</strong></div>
                            <div class="contact-item"><span style="color: #c5a059; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;">WHATSAPP</span><br><strong style="font-size: 1.2rem;">0086 18902465287</strong></div>
                        </div>
                    </div>
                    <div class="contact-form" style="padding: 70px; background: #fff; position: relative;">
                        <form id="F-PREMIUM" action="https://formsubmit.co/sales@aizjewelry.com" method="POST">
                            <input type="email" name="email" placeholder="Business Email" required style="width: 100%; padding: 18px; margin-bottom: 20px; border: 1px solid #eee; background: #fcfcfc;">
                            <textarea name="message" placeholder="Brand vision..." rows="7" required style="width: 100%; padding: 18px; margin-bottom: 25px; border: 1px solid #eee; background: #fcfcfc; resize: none;"></textarea>
                            <button type="submit" style="width: 100%; background: #111; color: #fff; padding: 24px; border: none; font-weight: 700; letter-spacing: 4px; cursor: pointer; text-transform: uppercase;">INQUIRE NOW</button>
                        </form>
                        <div id="T-PREMIUM" class="thank-you-inline">
                            <div style="font-size: 5rem; color: #c5a059; margin-bottom: 25px;">✓</div>
                            <h3 style="font-family: 'Bodoni Moda', serif; font-size: 2.5rem;">Thank you!</h3>
                            <p style="color: #666; font-size: 1.1rem;">Your inquiry has been sent.</p>
                            <a href="index.html" class="back-home-premium-btn">BACK TO HOME</a>
                        </div>
                        <div id="B-PREMIUM" style="text-align: right; margin-top: 40px;"><a href="index.html" style="color: #bbb; text-decoration: none; font-size: 0.85rem;">← BACK TO HOME</a></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer style="text-align: center; padding: 40px 0; color: #aaa; border-top: 1px solid #eee;">&copy; 2026 Aiz Jewelry. All Rights Reserved.</footer>
    <script>
        document.getElementById("F-PREMIUM").onsubmit = function(e){
            e.preventDefault();
            this.style.display="none";
            document.getElementById("B-PREMIUM").style.display="none";
            const ty = document.getElementById("T-PREMIUM");
            ty.style.setProperty("display", "block", "important");
            ty.classList.add("visible");
            fetch("https://formsubmit.co/ajax/sales@aizjewelry.com", {method:"POST", body:new FormData(this)});
        };
    </script>
</body>
</html>
