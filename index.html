<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiz Jewelry | Premium Custom Jewelry Factory Shenzhen</title>
    <link rel="stylesheet" href="style.css?v=20.0">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400..900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header"><nav class="container nav-container" style="display:flex; justify-content:space-between; align-items:center; padding:25px 0;"><a href="index.html" class="logo" style="display:flex; align-items:center; gap:15px; text-decoration:none;"><img src="https://sc02.alicdn.com/kf/Se1318a00bc9742468f7f2b69415cb0b7e.png" style="height:50px;"><div class="logo-text" style="display:flex; flex-direction:column; color:#111;"><span style="font-size:1.6rem; font-weight:800; letter-spacing:2px;">AIZ</span><span style="font-size:0.75rem; letter-spacing:4px; color:#c5a059;">JEWELRY</span></div></a><div class="nav-links" style="display:flex; align-items:center; gap:40px;"><a href="#products" style="text-decoration:none; color:#111; font-weight:600;">PRODUCTS</a><a href="contact.html" style="background:#111; color:#fff; padding:12px 25px; text-decoration:none; font-weight:700;">GET A QUOTE</a></div></nav></header>
    
    <!-- 这里是首页主体内容... -->
    <main>
        <section class="hero" style="height:60vh; background:#f9f9f9; display:flex; align-items:center; justify-content:center;"><h1>Sustainable Custom Jewelry</h1></section>
        
        <section id="contact" class="section">
            <div class="container">
                <div class="contact-card" style="display:grid; grid-template-columns:1fr 1.2fr; box-shadow:0 30px 70px rgba(0,0,0,0.12); overflow:hidden;">
                    <div class="contact-info" style="background:#111; color:#fff; padding:60px;">
                        <h2 style="font-family:'Bodoni Moda', serif; font-size:3rem; margin-bottom:25px;">Collaborate with Your Brand Partner</h2>
                        <div class="contact-details" style="display:flex; flex-direction:column; gap:20px; margin-top:40px;">
                            <div class="contact-item"><span style="color:#c5a059; font-size:0.75rem;">EMAIL</span><br><strong>sales@aizjewelry.com</strong></div>
                            <div class="contact-item"><span style="color:#c5a059; font-size:0.75rem;">WHATSAPP</span><br><strong>0086 18902465287</strong></div>
                        </div>
                    </div>
                    <div class="contact-form" style="padding:60px; background:#fff; position:relative;">
                        <form id="F-INDEX" action="https://formsubmit.co/sales@aizjewelry.com" method="POST">
                            <input type="email" placeholder="Email" required style="width:100%; padding:18px; margin-bottom:15px; border:1px solid #eee;">
                            <textarea placeholder="Message" rows="6" required style="width:100%; padding:18px; margin-bottom:20px; border:1px solid #eee;"></textarea>
                            <button type="submit" style="width:100%; background:#111; color:#fff; padding:22px; border:none; font-weight:700; cursor:pointer;">INQUIRE NOW</button>
                        </form>
                        <div id="T-INDEX" style="display:none; text-align:center; padding:40px 0;">
                            <div style="font-size:4rem; color:#c5a059;">✓</div>
                            <h3 style="font-family:'Bodoni Moda', serif; font-size:2.5rem;">Thank you!</h3><p>We will contact you in 12h.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer style="text-align:center; padding:40px 0; color:#aaa; border-top:1px solid #eee;">&copy; 2026 Aiz Jewelry. All Rights Reserved.</footer>
    <script>
        document.getElementById("F-INDEX").onsubmit = function(e){{ e.preventDefault(); this.style.display="none"; document.getElementById("T-INDEX").style.display="block"; fetch("https://formsubmit.co/ajax/sales@aizjewelry.com",{{method:"POST", body:new FormData(this)}}); }};
    </script>
</body>
</html>
